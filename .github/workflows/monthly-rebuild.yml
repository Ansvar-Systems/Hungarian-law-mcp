name: Monthly Rebuild

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run ingest
        run: npm run ingest

      - name: Build database
        run: npm run build:db

      - name: Upload rebuild logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-rebuild-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
          if-no-files-found: ignore
          retention-days: 30

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Monthly rebuild failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '## Monthly rebuild failed',
              '',
              `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Date:** ${new Date().toISOString()}`,
              '',
              'Please investigate the rebuild failure and re-run manually once the issue is resolved.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['rebuild-failure', 'automated'],
            });
